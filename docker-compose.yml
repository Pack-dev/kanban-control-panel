# docker-compose.yml — production-style local stack.
#
# Topology:
#   postgres  — persistent volume, port 5432 (configurable)
#   backend   — Go + pgx, depends on postgres healthcheck
#   frontend  — nginx serving the SPA + proxying /api → backend
#
# Single entry point: the frontend container's nginx serves the SPA on
# ${HOST_PORT:-8080} and proxies /api/* to the backend over the internal
# docker network. The backend itself is NOT exposed to the host.
#
# Usage:
#   git clone --recursive https://github.com/Pack-dev/kanban-control-panel.git
#   cd kanban-control-panel
#   cp .env.example .env       # set JWT_SECRET (required) and any overrides
#   docker compose up --build
#   open http://localhost:8080

services:
  postgres:
    image: postgres:16-alpine
    container_name: kanban-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kanban}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kanban}
      POSTGRES_DB: ${POSTGRES_DB:-kanban}
    volumes:
      - kanban_pgdata:/var/lib/postgresql/data
    # Published so you can `psql` against it from the host or run integration
    # tests with TEST_DATABASE_URL pointing here. Override the host port if
    # something else (a system postgres) already binds 5432.
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kanban} -d ${POSTGRES_DB:-kanban}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - kanban

  backend:
    build:
      context: ./backend
    image: kanban-backend:local
    container_name: kanban-backend
    restart: unless-stopped
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-kanban}:${POSTGRES_PASSWORD:-kanban}@postgres:5432/${POSTGRES_DB:-kanban}?sslmode=disable
      # Browser hits the nginx front-door, not the backend directly, so the
      # CORS_ORIGIN here only matters if someone curls /api from another origin.
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required — copy .env.example to .env}
      PROMOTE_EMAIL: ${PROMOTE_EMAIL:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - kanban
    # Backend port is intentionally NOT published — only nginx talks to it.
    # Uncomment for direct curl access during debugging:
    # ports:
    #   - "8080:8080"

  frontend:
    build:
      context: ./frontend
    image: kanban-frontend:local
    container_name: kanban-frontend
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - kanban

volumes:
  kanban_pgdata:

networks:
  kanban:
